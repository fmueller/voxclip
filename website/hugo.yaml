baseURL: https://voxclip.dev/
title: Voxclip
languageCode: en-us

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

enableRobotsTXT: true

menu:
  main:
    - name: Get Started
      pageRef: /docs/getting-started
      weight: 1
    - name: Use Cases
      pageRef: /use-cases
      weight: 2
    - name: Documentation
      pageRef: /docs
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/fmueller/voxclip"
      params:
        icon: github

params:
  description: Voice capture and transcription from your terminal. Record, transcribe, and copy — all locally with open-source speech models.

  navbar:
    displayTitle: true
    displayLogo: false

  theme:
    default: system
    displayToggle: true

  footer:
    displayCopyright: true
    displayPoweredBy: false

  page:
    width: wide

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content

  editURL:
    enable: true
    base: "https://github.com/fmueller/voxclip/edit/main/website/content"
